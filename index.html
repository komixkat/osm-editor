<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSM → Minecraft Editor</title>
  <meta name="description" content="Upload any OpenStreetMap .osm file, edit buildings and ground, preview in 3D, export for Arnis.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <div id="header">
    <div id="logo">OSM→MC EDITOR</div>
    <div id="file-info">
      <span id="file-name-display">No file loaded</span>
      <span id="file-stats"></span>
    </div>
    <input type="file" id="file-input"    accept=".osm,.xml" style="display:none">
    <input type="file" id="session-input" accept=".json"     style="display:none">
    <button class="header-btn primary" id="upload-btn">↑ Upload .osm</button>
    <button class="header-btn"         id="session-btn">↑ Session</button>
    <button class="header-btn"         id="view-toggle">3D View</button>
  </div>

  <div id="toolbar"></div>

  <div id="body-wrap">

    <div id="drop-zone">
      <div class="drop-icon">🗺</div>
      <div class="drop-title">Drop your .osm file here</div>
      <div class="drop-sub">Export from openstreetmap.org → Share → Format: OSM XML</div>
      <button class="drop-btn" id="drop-upload-btn">Or click to upload</button>
      <div class="drop-hint">Previous sessions auto-restore if available</div>
    </div>

    <div id="main-layout">
      <div id="canvas-area">
        <div id="canvas-2d-wrap">
          <canvas id="canvas-2d"></canvas>
        </div>
        <div id="canvas-3d-wrap">
          <canvas id="canvas-3d"></canvas>
          <div id="fly-hint">
            Click to capture mouse · WASD = move · Space = up · Shift = fast · Esc = release
          </div>
        </div>
        <div id="tooltip"></div>
      </div>
      <div id="sidebar">
        <div id="sb-tabs"></div>
        <div id="sb-body"></div>
      </div>
    </div>

  </div>

  <div id="statusbar">
    <div id="status-msg">Ready</div>
    <div id="status-counts"></div>
    <div id="coords-display">X:— Z:—</div>
  </div>

</div>

<div id="drop-overlay"></div>

<!-- No blocking external scripts. Three.js loads lazily when 3D is first opened. -->
<script type="module" src="src/main.js"></script>

</body>
</html>
