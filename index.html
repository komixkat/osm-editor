<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSM → Minecraft Editor</title>
  <meta name="description" content="Upload any OpenStreetMap .osm file, edit buildings/ground/roads, preview in 3D, export patched OSM for Arnis.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ── HEADER ─────────────────────────────────────────────────── -->
  <div id="header">
    <div id="logo">OSM→MC EDITOR</div>

    <div id="file-info">
      <span id="file-name-display">No file loaded</span>
      <span id="file-stats"></span>
    </div>

    <!-- Hidden file inputs — triggered by buttons below -->
    <input type="file" id="file-input"    accept=".osm,.xml" style="display:none">
    <input type="file" id="session-input" accept=".json"     style="display:none">

    <button class="header-btn primary" id="upload-btn">↑ Upload .osm</button>
    <button class="header-btn"         id="session-btn">↑ Session</button>
    <button class="header-btn"         id="view-toggle">3D View</button>
  </div>

  <!-- ── TOOLBAR ────────────────────────────────────────────────── -->
  <div id="toolbar"></div>

  <!-- ── BODY ───────────────────────────────────────────────────── -->
  <div id="body-wrap">

    <!-- DROP ZONE — shown before any file is loaded -->
    <div id="drop-zone">
      <div class="drop-icon">🗺</div>
      <div class="drop-title">Drop your .osm file here</div>
      <div class="drop-sub">Export from openstreetmap.org → Share → Format: OSM XML</div>
      <button class="drop-btn" id="drop-upload-btn">Or click to upload</button>
      <div class="drop-hint">Previous sessions auto-restore if available</div>
    </div>

    <!-- MAIN LAYOUT — shown after file loaded -->
    <div id="main-layout">

      <div id="canvas-area">
        <div id="canvas-2d-wrap">
          <canvas id="canvas-2d"></canvas>
        </div>
        <div id="canvas-3d-wrap">
          <canvas id="canvas-3d"></canvas>
          <div id="fly-hint">
            Click to capture mouse · WASD = move · Space = up · Shift+W = fast · Esc = release
          </div>
        </div>
        <div id="tooltip"></div>
      </div>

      <div id="sidebar">
        <div id="sb-tabs"></div>
        <div id="sb-body"></div>
      </div>

    </div>

  </div>

  <!-- ── STATUS BAR ────────────────────────────────────────────── -->
  <div id="statusbar">
    <div id="status-msg">Loading…</div>
    <div id="status-counts"></div>
    <div id="coords-display">X:— Z:—</div>
  </div>

</div>

<div id="drop-overlay"></div>

<!-- Three.js — loads synchronously before ES modules -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script type="module" src="src/main.js"></script>

</body>
</html>
